server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "securesphere.io"
    data_dir = "/opt/spire/data/server"
    log_level = "INFO"
    # Production: Use disk-based keys or HSM. Here we use disk.
    ca_key_type = "ec-p384"
    
    # Default TTL for SVIDs (Certificates)
    default_x509_svid_ttl = "1h"
    default_jwt_svid_ttl = "5m"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/opt/spire/data/server/datastore.sqlite3"
        }
    }
    
    # The 'KeyManager' handles the signing keys.
    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/server/keys"
        }
    }

    # The 'NodeAttestor' verifies the identity of the physical/virtual nodes (Agents).
    # In Prod: Use 'aws_iid', 'gcp_iit', or 'k8s_sat'.
    # For Dev/Local Prod Sim: We use 'join_token' (simple pre-shared key).
    NodeAttestor "join_token" {
        plugin_data {}
    }
}